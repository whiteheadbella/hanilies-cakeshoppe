{% extends 'hanilies/base.html' %}

{% block title %}Password Reset Sent{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0">
                <div class="card-header bg-gold-pink text-white text-center py-4">
                    <i class="fas fa-envelope-open-text fa-3x mb-3"></i>
                    <h4 class="mb-0">Check Your Email</h4>
                </div>
                <div class="card-body p-5 text-center">
                    <p class="mb-4">{{ confirmation_message }}</p>
                    <a href="{% url 'login' %}" class="btn btn-outline-secondary px-4">Return to Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
